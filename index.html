<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Text Design Maker - Supreme Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        body.urdu {
            direction: rtl;
        }

        body.english {
            direction: ltr;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 2.8em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            background: #f0f3ff;
            padding: 8px;
            border-radius: 10px;
        }

        .lang-btn {
            padding: 10px 20px;
            border: 2px solid transparent;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        body.urdu .control-group {
            border-left: none;
            border-right: 4px solid #667eea;
        }

        .control-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(to right, #667eea, #764ba2);
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
        }

        .slider-value {
            font-size: 0.85em;
            color: #666;
            text-align: center;
            font-weight: 600;
        }

        .effect-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .effect-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .effect-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
        }

        .effect-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-box {
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 40px;
            background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 550px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .preview-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 50%);
            pointer-events: none;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
        }

        .buttons-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f3ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
            font-style: italic;
        }

        .decoration-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .decoration-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .decoration-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .decoration-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .buttons-group {
                grid-template-columns: 1fr;
            }

            .main-content {
                gap: 20px;
            }
        }
    </style>
</head>
<body class="urdu">
    <div class="container">
        <div class="header">
            <h1>✨ 3D Text Design Maker - Supreme ✨</h1>
            <p id="subtitle">لفظ بہ لفظ رنگین، شاندار اور سجاوٹ والا</p>
            
            <div class="language-toggle">
                <button class="lang-btn active" onclick="switchLanguage('urdu')">🇵🇰 اردو</button>
                <button class="lang-btn" onclick="switchLanguage('english')">🇺🇸 English</button>
            </div>
        </div>

        <div class="main-content">
            <div class="control-panel">
                <div class="control-group">
                    <label id="label-text">📝 آپ کا متن</label>
                    <input type="text" id="textInput" value="السلام علیکم" maxlength="150" placeholder="اپنا جملہ لکھیں..." onchange="render()">
                    <p class="info-text">ہر لفظ کو اپنا رنگ ملے گا!</p>
                </div>

                <div class="control-group">
                    <label id="label-fontSize">حروف کا سائز</label>
                    <div class="slider-group">
                        <input type="range" id="fontSize" min="50" max="130" value="90" onchange="updateFontSize(this.value); render();">
                        <span class="slider-value" id="fontSizeValue">90px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-effect">3D اثر اور رنگین انداز</label>
                    <div class="effect-buttons">
                        <button class="effect-btn active" data-effect="premium" onclick="setEffect(event, 'premium')">💎 Premium</button>
                        <button class="effect-btn" data-effect="fire" onclick="setEffect(event, 'fire')">🔥 Fire</button>
                        <button class="effect-btn" data-effect="ocean" onclick="setEffect(event, 'ocean')">🌊 Ocean</button>
                        <button class="effect-btn" data-effect="sunset" onclick="setEffect(event, 'sunset')">🌅 Sunset</button>
                        <button class="effect-btn" data-effect="forest" onclick="setEffect(event, 'forest')">🌲 Forest</button>
                        <button class="effect-btn" data-effect="royal" onclick="setEffect(event, 'royal')">👑 Royal</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-shadow">سایہ کی گہرائی</label>
                    <div class="slider-group">
                        <input type="range" id="shadowDepth" min="10" max="40" value="25" onchange="updateShadowDepth(this.value); render();">
                        <span class="slider-value" id="shadowDepthValue">25px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-decoration">سجاوٹ</label>
                    <div class="decoration-options">
                        <button class="decoration-btn active" data-decoration="flowers" onclick="setDecoration(event, 'flowers')">🌸 پھول</button>
                        <button class="decoration-btn" data-decoration="butterflies" onclick="setDecoration(event, 'butterflies')">🦋 تتلیاں</button>
                        <button class="decoration-btn" data-decoration="sparkles" onclick="setDecoration(event, 'sparkles')">✨ چمک</button>
                        <button class="decoration-btn" data-decoration="leaves" onclick="setDecoration(event, 'leaves')">🍃 پتیاں</button>
                        <button class="decoration-btn" data-decoration="hearts" onclick="setDecoration(event, 'hearts')">💚 دل</button>
                        <button class="decoration-btn" data-decoration="none" onclick="setDecoration(event, 'none')">❌ نہیں</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-background">پس منظر</label>
                    <select id="backgroundSelect" onchange="render()">
                        <option value="white">سفید (صاف)</option>
                        <option value="gradient">گریڈینٹ (شاندار)</option>
                        <option value="light">روشن</option>
                        <option value="cream">کریم</option>
                    </select>
                </div>
            </div>

            <div class="preview-container">
                <div class="preview-box" id="previewBox">
                    <canvas id="canvas" width="1000" height="650"></canvas>
                </div>

                <div class="buttons-group">
                    <button class="btn btn-primary" onclick="downloadImage()">📥 ڈاؤن لوڈ 8K</button>
                    <button class="btn btn-secondary" onclick="resetSettings()">↺ دوبارہ</button>
                </div>

                <p class="info-text" style="text-align: center;">💎 الٹرا HD (4000x2600px) • صاف اور شاندار</p>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            urdu: {
                subtitle: "لفظ بہ لفظ رنگین، شاندار اور سجاوٹ والا",
                'label-text': "📝 آپ کا متن",
                'label-fontSize': "حروف کا سائز",
                'label-effect': "3D اثر اور رنگین انداز",
                'label-shadow': "سایہ کی گہرائی",
                'label-decoration': "سجاوٹ",
                'label-background': "پس منظر",
            },
            english: {
                subtitle: "Word-by-Word Coloring with Decorations & Shine",
                'label-text': "📝 Your Text",
                'label-fontSize': "Font Size",
                'label-effect': "3D Effect & Color Scheme",
                'label-shadow': "Shadow Depth",
                'label-decoration': "Decorations",
                'label-background': "Background",
            }
        };

        let currentLanguage = 'urdu';
        let currentEffect = 'premium';
        let currentDecoration = 'flowers';

        const colorSchemes = {
            premium: ['#C41E3A', '#9932CC', '#FFD700', '#00CED1', '#FF6347', '#20B2AA', '#DC143C'],
            fire: ['#FF0000', '#FF6600', '#FF3300', '#FFAA00', '#FF9900', '#FF1100', '#FF4400'],
            ocean: ['#0099FF', '#00CCFF', '#0066FF', '#00BBFF', '#3399FF', '#0088FF', '#0055FF'],
            sunset: ['#FF6B35', '#F7931E', '#FDB833', '#F37335', '#FF8C42', '#E76F51', '#D4A373'],
            forest: ['#2D5016', '#3A7D44', '#90BE6D', '#F9C74F', '#5A8C5A', '#42753B', '#6B9080'],
            royal: ['#4B0082', '#9932CC', '#8A2BE2', '#6A0DAD', '#7851A9', '#9932CC', '#8B008B']
        };

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.body.classList.remove('urdu', 'english');
            document.body.classList.add(lang);
            
            Object.keys(translations[lang]).forEach(key => {
                const element = document.getElementById(key);
                if (element) element.textContent = translations[lang][key];
            });
            
            render();
        }

        function updateFontSize(value) {
            document.getElementById('fontSizeValue').textContent = value + 'px';
        }

        function updateShadowDepth(value) {
            document.getElementById('shadowDepthValue').textContent = value + 'px';
        }

        function setEffect(e, effect) {
            document.querySelectorAll('.effect-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentEffect = effect;
            render();
        }

        function setDecoration(e, decoration) {
            document.querySelectorAll('.decoration-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentDecoration = decoration;
            render();
        }

        function drawFlowers(ctx, x, y, size, opacity) {
            ctx.globalAlpha = opacity;
            ctx.fillStyle = '#FFB6C1';
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const px = x + Math.cos(angle) * size;
                const py = y + Math.sin(angle) * size;
                ctx.beginPath();
                ctx.arc(px, py, size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y, size / 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawButterflies(ctx, x, y, size, opacity) {
            ctx.globalAlpha = opacity;
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.ellipse(x - size/2, y, size/2, size/3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + size/2, y, size/2, size/3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawDecorations(ctx, width, height) {
            if (currentDecoration === 'none') return;

            const positions = [
                {x: 80, y: 80}, {x: width - 80, y: 80},
                {x: 80, y: height - 80}, {x: width - 80, y: height - 80},
                {x: width/2, y: 60}, {x: width/2, y: height - 60}
            ];

            positions.forEach(pos => {
                if (currentDecoration === 'flowers') {
                    drawFlowers(ctx, pos.x, pos.y, 25, 0.4);
                } else if (currentDecoration === 'butterflies') {
                    drawButterflies(ctx, pos.x, pos.y, 20, 0.4);
                } else if (currentDecoration === 'sparkles') {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                } else if (currentDecoration === 'leaves') {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#90EE90';
                    ctx.beginPath();
                    ctx.ellipse(pos.x, pos.y, 8, 12, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                } else if (currentDecoration === 'hearts') {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#FF1493';
                    ctx.beginPath();
                    ctx.arc(pos.x - 5, pos.y - 5, 5, 0, Math.PI * 2);
                    ctx.arc(pos.x + 5, pos.y - 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            });
        }

        function drawWord3D(ctx, word, x, y, fontSize, color, shadowColor, shadowDepth) {
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Deep shadow
            for (let i = shadowDepth; i > 0; i--) {
                ctx.fillStyle = `rgba(0, 0, 0, ${(shadowDepth - i) / shadowDepth * 0.6})`;
                ctx.fillText(word, x + i * 1.5, y + i * 1.5);
            }

            // Gradient fill
            const gradient = ctx.createLinearGradient(x - fontSize * 2, y - fontSize, x + fontSize * 2, y + fontSize);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.5, adjustBrightness(color, 1.3));
            gradient.addColorStop(1, color);
            
            ctx.fillStyle = gradient;
            ctx.fillText(word, x, y);

            // Stroke for edge definition
            ctx.strokeStyle = adjustBrightness(color, 0.6);
            ctx.lineWidth = 2;
            ctx.strokeText(word, x, y);

            // Shine/Glow
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(word, x, y - fontSize / 4);
            ctx.globalAlpha = 1;
        }

        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace('#',''), 16);
            const amt = Math.round(2.55 * (percent - 1));
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function render() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            const text = document.getElementById('textInput').value || 'السلام علیکم';
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value);
            const background = document.getElementById('backgroundSelect').value;
            const colors = colorSchemes[currentEffect];

            // Background
            if (background === 'white') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (background === 'gradient') {
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#F5F7FA');
                grad.addColorStop(1, '#E8EAEF');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (background === 'light') {
                ctx.fillStyle = '#F9F9F9';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (background === 'cream') {
                ctx.fillStyle = '#FFF8DC';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Draw decorations
            drawDecorations(ctx, canvas.width, canvas.height);

            // Split text into words
            const words = text.trim().split(/\s+/);
            const totalWidth = words.reduce((sum, word) => {
                ctx.font = `bold ${fontSize}px Arial`;
                return sum + ctx.measureText(word).width + 20;
            }, 0);

            let startX = (canvas.width - totalWidth) / 2;
            const centerY = canvas.height / 2;

            // Draw each word with different color
            words.forEach((word, index) => {
                ctx.font = `bold ${fontSize}px Arial`;
                const wordWidth = ctx.measureText(word).width;
                const color = colors[index % colors.length];
                
                drawWord3D(ctx, word, startX + wordWidth / 2, centerY, fontSize, color, '#000000', shadowDepth);
                
                startX += wordWidth + 20;
            });
        }

        function downloadImage() {
            const hires = document.createElement('canvas');
            hires.width = 4000;
            hires.height = 2600;
            const ctxHires = hires.getContext('2d');
            const scale = 4;

            const text = document.getElementById('textInput').value || 'السلام علیکم';
            const fontSize = parseInt(document.getElementById('fontSize').value) * scale;
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value) * scale;
            const background = document.getElementById('backgroundSelect').value;
            const colors = colorSchemes[currentEffect];

            // Background
            if (background === 'white') {
                ctxHires.fillStyle = '#FFFFFF';
                ctxHires.fillRect(0, 0, hires.width, hires.height);
            } else if (background === 'gradient') {
                const grad = ctxHires.createLinearGradient(0, 0, hires.width, hires.height);
                grad.addColorStop(0, '#F5F7FA');
                grad.addColorStop(1, '#E8EAEF');
                ctxHires.fillStyle = grad;
                ctxHires.fillRect(0, 0, hires.width, hires.height);
            } else if (background === 'light') {
                ctxHires.fillStyle = '#F9F9F9';
                ctxHires.fillRect(0, 0, hires.width, hires.height);
            } else if (background === 'cream') {
                ctxHires.fillStyle = '#FFF8DC';
                ctxHires.fillRect(0, 0, hires.width, hires.height);
            }

            // Draw decorations at high res
            const positions = [
                {x: 150, y: 150}, {x: hires.width - 150, y: 150},
                {x: 150, y: hires.height - 150}, {x: hires.width - 150, y: hires.height - 150},
                {x: hires.width/2, y: 120}, {x: hires.width/2, y: hires.height - 120}
            ];

            positions.forEach(pos => {
                if (currentDecoration === 'flowers') drawFlowers(ctxHires, pos.x, pos.y, 60, 0.4);
                else if (currentDecoration === 'butterflies') drawButterflies(ctxHires, pos.x, pos.y, 50, 0.4);
            });

            // Draw words
            const words = text.trim().split(/\s+/);
            const totalWidth = words.reduce((sum, word) => {
                ctxHires.font = `bold ${fontSize}px Arial`;
                return sum + ctxHires.measureText(word).width + 40;
            }, 0);

            let startX = (hires.width - totalWidth) / 2;
            const centerY = hires.height / 2;

            words.forEach((word, index) => {
                ctxHires.font = `bold ${fontSize}px Arial`;
                const wordWidth = ctxHires.measureText(word).width;
                const color = colors[index % colors.length];
                
                drawWord3D(ctxHires, word, startX + wordWidth / 2, centerY, fontSize, color, '#000000', shadowDepth);
                
                startX += wordWidth + 40;
            });

            const link = document.createElement('a');
            link.href = hires.toDataURL('image/png');
            link.download = `3D-Design-${Date.now()}.png`;
            link.click();
        }

        function resetSettings() {
            document.getElementById('textInput').value = 'السلام علیکم';
            document.getElementById('fontSize').value = 90;
            document.getElementById('shadowDepth').value = 25;
            document.getElementById('backgroundSelect').value = 'white';
            document.getElementById('fontSizeValue').textContent = '90px';
            document.getElementById('shadowDepthValue').textContent = '25px';
            document.querySelectorAll('.effect-btn')[0].click();
            document.querySelectorAll('.decoration-btn')[0].click();
            render();
        }

        setTimeout(() => render(), 500);
    </script>
</body>
</html>
