<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Text Design Maker - Premium Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        .luxury-header {
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 31, 78, 0.9) 100%);
            border-bottom: 3px solid #d4af37;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
        }

        .luxury-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .header-title {
            font-size: 3.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .header-subtitle {
            color: #d4af37;
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .language-toggle {
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37;
            border-radius: 50px;
            padding: 10px 20px;
            width: fit-content;
            margin: 0 auto;
        }

        .lang-btn {
            padding: 12px 25px;
            border: 2px solid transparent;
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            color: #d4af37;
            transition: all 0.3s;
            font-size: 1em;
            letter-spacing: 1px;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0a0e27;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .premium-container {
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .control-section {
            background: linear-gradient(135deg, rgba(26, 31, 78, 0.8) 0%, rgba(45, 27, 78, 0.8) 100%);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.4em;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 15px;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f0e68c;
            font-size: 1em;
            letter-spacing: 1px;
        }

        input[type="text"],
        textarea,
        select,
        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #d4af37;
            opacity: 0.6;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus,
        input[type="file"]:focus {
            border-color: #f0e68c;
            outline: none;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.1);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: linear-gradient(90deg, #d4af37 0%, #f0e68c 100%);
            -webkit-appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.7);
            transform: scale(1.1);
        }

        .slider-value {
            text-align: center;
            color: #d4af37;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-grid.col-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .option-btn {
            padding: 14px;
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #d4af37;
            transition: all 0.3s;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .option-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .option-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0a0e27;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            border-color: #f0e68c;
            font-weight: 700;
        }

        .preview-section {
            background: linear-gradient(135deg, rgba(26, 31, 78, 0.8) 0%, rgba(45, 27, 78, 0.8) 100%);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .preview-title {
            font-size: 1.4em;
            color: #d4af37;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 15px;
        }

        .preview-box {
            border: 3px solid #d4af37;
            border-radius: 15px;
            padding: 50px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 20px rgba(212, 175, 55, 0.1), 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .preview-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.5) 0%, transparent 50%);
            pointer-events: none;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
        }

        .button-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            padding: 18px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-download {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0a0e27;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-download:active {
            transform: translateY(-1px);
        }

        .btn-reset {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .info-text {
            text-align: center;
            color: #d4af37;
            font-size: 0.9em;
            margin-top: 15px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        @media (max-width: 1400px) {
            .main-grid {
                gap: 30px;
            }

            .control-section,
            .preview-section {
                padding: 30px;
            }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 2.2em;
            }

            .control-section,
            .preview-section {
                padding: 25px;
            }
        }

        @media (max-width: 768px) {
            .luxury-header {
                padding: 25px 15px;
            }

            .header-title {
                font-size: 1.8em;
            }

            .premium-container {
                margin: 25px auto;
            }

            .control-section,
            .preview-section {
                padding: 20px;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }

            .button-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="urdu">
    <div class="luxury-header">
        <div class="header-title">✨ 3D TEXT DESIGN MAKER ✨</div>
        <div class="header-subtitle" id="subtitle">Metallic • Multi-line • Frames • Premium Design</div>
        
        <div class="language-toggle">
            <button class="lang-btn active" onclick="switchLanguage('urdu')">🇵🇰 اردو</button>
            <button class="lang-btn" onclick="switchLanguage('english')">🇺🇸 English</button>
        </div>
    </div>

    <div class="premium-container">
        <div class="main-grid">
            <!-- CONTROLS SECTION -->
            <div class="control-section">
                <div class="section-title" id="sec-controls">⚙️ کنٹرول</div>

                <div class="control-group">
                    <label class="control-label" id="label-text">📝 آپ کا متن</label>
                    <textarea id="textInput" placeholder="متن لکھیں...">السلام علیکم
ورحمة الله</textarea>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-fontSize">📐 حروف کا سائز</label>
                    <div class="slider-group">
                        <input type="range" id="fontSize" min="50" max="140" value="90" onchange="updateFontSize(this.value); render();">
                        <span class="slider-value" id="fontSizeValue">90px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-effect">💎 Metallic اثر</label>
                    <div class="button-grid col-3">
                        <button class="option-btn active" data-effect="chrome" onclick="setEffect(event, 'chrome')">Chrome</button>
                        <button class="option-btn" data-effect="gold" onclick="setEffect(event, 'gold')">Gold</button>
                        <button class="option-btn" data-effect="silver" onclick="setEffect(event, 'silver')">Silver</button>
                        <button class="option-btn" data-effect="copper" onclick="setEffect(event, 'copper')">Copper</button>
                        <button class="option-btn" data-effect="titanium" onclick="setEffect(event, 'titanium')">Titanium</button>
                        <button class="option-btn" data-effect="bronze" onclick="setEffect(event, 'bronze')">Bronze</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-shadow">🌑 سایہ کی گہرائی</label>
                    <div class="slider-group">
                        <input type="range" id="shadowDepth" min="10" max="50" value="28" onchange="updateShadowDepth(this.value); render();">
                        <span class="slider-value" id="shadowDepthValue">28px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-frame">🖼️ فریم اور Border</label>
                    <div class="button-grid">
                        <button class="option-btn active" data-frame="none" onclick="setFrame(event, 'none')">نہیں</button>
                        <button class="option-btn" data-frame="simple" onclick="setFrame(event, 'simple')">سادہ</button>
                        <button class="option-btn" data-frame="gold" onclick="setFrame(event, 'gold')">سنہری</button>
                        <button class="option-btn" data-frame="classic" onclick="setFrame(event, 'classic')">کلاسیک</button>
                        <button class="option-btn" data-frame="rounded" onclick="setFrame(event, 'rounded')">گول</button>
                        <button class="option-btn" data-frame="ornate" onclick="setFrame(event, 'ornate')">سجاوٹ</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-bg-image">🖼️ Background Image</label>
                    <input type="file" id="bgImageInput" accept="image/*" onchange="loadBackgroundImage(this)">
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-background">🎨 پس منظر</label>
                    <select id="backgroundSelect" onchange="render()">
                        <option value="white">سفید</option>
                        <option value="gradient">گریڈینٹ</option>
                        <option value="light">روشن</option>
                        <option value="cream">کریم</option>
                    </select>
                </div>
            </div>

            <!-- PREVIEW SECTION -->
            <div class="preview-section">
                <div class="section-title" id="sec-preview">👁️ پریویو</div>

                <div class="preview-box" id="previewBox">
                    <canvas id="canvas" width="1000" height="700"></canvas>
                </div>

                <div class="button-container">
                    <button class="action-btn btn-download" onclick="downloadImage()" id="btn-download">📥 Download 8K</button>
                    <button class="action-btn btn-reset" onclick="resetSettings()" id="btn-reset">↺ Reset</button>
                </div>

                <p class="info-text">💎 Ultra HD Quality • 4000 x 2800px</p>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            urdu: {
                subtitle: "Metallic • Multi-line • Frames • Premium Design",
                'sec-controls': "⚙️ کنٹرول",
                'sec-preview': "👁️ پریویو",
                'label-text': "📝 آپ کا متن",
                'label-fontSize': "📐 حروف کا سائز",
                'label-effect': "💎 Metallic اثر",
                'label-shadow': "🌑 سایہ کی گہرائی",
                'label-frame': "🖼️ فریم اور Border",
                'label-bg-image': "🖼️ Background Image",
                'label-background': "🎨 پس منظر",
                'btn-download': "📥 Download 8K",
                'btn-reset': "↺ Reset",
            },
            english: {
                subtitle: "Metallic • Multi-line • Frames • Premium Design",
                'sec-controls': "⚙️ Controls",
                'sec-preview': "👁️ Preview",
                'label-text': "📝 Your Text",
                'label-fontSize': "📐 Font Size",
                'label-effect': "💎 Metallic Effect",
                'label-shadow': "🌑 Shadow Depth",
                'label-frame': "🖼️ Frame & Border",
                'label-bg-image': "🖼️ Background Image",
                'label-background': "🎨 Background",
                'btn-download': "📥 Download 8K",
                'btn-reset': "↺ Reset",
            }
        };

        let currentLanguage = 'urdu';
        let currentEffect = 'chrome';
        let currentFrame = 'none';
        let backgroundImage = null;

        const metallicSchemes = {
            chrome: { light: '#E8E8E8', mid: '#A9A9A9', dark: '#505050', highlight: '#FFFFFF' },
            gold: { light: '#FFD700', mid: '#DAA520', dark: '#B8860B', highlight: '#FFED4E' },
            silver: { light: '#E5E5EA', mid: '#B0B0B0', dark: '#696969', highlight: '#FFFFFF' },
            copper: { light: '#DD8742', mid: '#B87333', dark: '#704214', highlight: '#FF9966' },
            titanium: { light: '#D3D3D3', mid: '#808080', dark: '#404040', highlight: '#E0E0E0' },
            bronze: { light: '#CD7F32', mid: '#A67C52', dark: '#6B4423', highlight: '#E8A652' }
        };

        function switchLanguage(lang) {
            currentLanguage = lang;
            Object.keys(translations[lang]).forEach(key => {
                const element = document.getElementById(key);
                if (element) element.textContent = translations[lang][key];
            });
            render();
        }

        function updateFontSize(value) {
            document.getElementById('fontSizeValue').textContent = value + 'px';
        }

        function updateShadowDepth(value) {
            document.getElementById('shadowDepthValue').textContent = value + 'px';
        }

        function setEffect(e, effect) {
            document.querySelectorAll('[data-effect]').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentEffect = effect;
            render();
        }

        function setFrame(e, frame) {
            document.querySelectorAll('[data-frame]').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentFrame = frame;
            render();
        }

        function loadBackgroundImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        backgroundImage = img;
                        render();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function drawFrame(ctx, width, height, frameType) {
            if (frameType === 'none') return;

            ctx.save();
            const scheme = metallicSchemes[currentEffect];

            if (frameType === 'simple') {
                ctx.lineWidth = 6;
                ctx.strokeStyle = scheme.mid;
                ctx.strokeRect(20, 20, width - 40, height - 40);
            } else if (frameType === 'gold') {
                ctx.lineWidth = 10;
                ctx.strokeStyle = '#DAA520';
                ctx.strokeRect(12, 12, width - 24, height - 24);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#FFD700';
                ctx.strokeRect(20, 20, width - 40, height - 40);
            } else if (frameType === 'classic') {
                ctx.lineWidth = 4;
                ctx.strokeStyle = scheme.mid;
                ctx.strokeRect(30, 30, width - 60, height - 60);
                ctx.lineWidth = 1;
                ctx.strokeStyle = scheme.light;
                ctx.strokeRect(35, 35, width - 70, height - 70);
            } else if (frameType === 'rounded') {
                ctx.lineWidth = 7;
                ctx.strokeStyle = scheme.mid;
                ctx.beginPath();
                ctx.roundRect(15, 15, width - 30, height - 30, 25);
                ctx.stroke();
            } else if (frameType === 'ornate') {
                ctx.lineWidth = 6;
                ctx.strokeStyle = scheme.mid;
                ctx.strokeRect(25, 25, width - 50, height - 50);
                ctx.fillStyle = scheme.light;
                const spacing = 50;
                for (let i = 25; i < width; i += spacing) {
                    ctx.beginPath();
                    ctx.arc(i, 25, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(i, height - 25, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let i = 25; i < height; i += spacing) {
                    ctx.beginPath();
                    ctx.arc(25, i, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(width - 25, i, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        function drawMetallicText(ctx, text, x, y, fontSize, scheme, shadowDepth) {
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Deep shadows
            for (let i = shadowDepth; i > 0; i--) {
                ctx.fillStyle = `rgba(0, 0, 0, ${(shadowDepth - i) / shadowDepth * 0.8})`;
                ctx.fillText(text, x + i * 1.8, y + i * 1.8);
            }

            // Metallic gradient
            const gradient = ctx.createLinearGradient(x - fontSize * 2.5, y - fontSize / 2, x + fontSize * 2.5, y + fontSize / 2);
            gradient.addColorStop(0, scheme.light);
            gradient.addColorStop(0.3, scheme.mid);
            gradient.addColorStop(0.7, scheme.dark);
            gradient.addColorStop(1, scheme.light);

            ctx.fillStyle = gradient;
            ctx.fillText(text, x, y);

            // Edge definition
            ctx.strokeStyle = scheme.dark;
            ctx.lineWidth = 2;
            ctx.strokeText(text, x, y);

            // Highlight shine
            ctx.globalAlpha = 0.7;
            const highlightGrad = ctx.createLinearGradient(x - fontSize * 1.5, y - fontSize / 2, x - fontSize / 2, y + fontSize);
            highlightGrad.addColorStop(0, scheme.highlight);
            highlightGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = highlightGrad;
            ctx.fillText(text, x, y);
            ctx.globalAlpha = 1;
        }

        function render() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const textInput = document.getElementById('textInput').value || 'السلام علیکم';
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value);
            const scheme = metallicSchemes[currentEffect];

            // Background
            if (backgroundImage) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            } else {
                const bg = document.getElementById('backgroundSelect').value;
                if (bg === 'white') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (bg === 'gradient') {
                    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    grad.addColorStop(0, '#F5F7FA');
                    grad.addColorStop(1, '#E8EAEF');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (bg === 'light') {
                    ctx.fillStyle = '#F9F9F9';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (bg === 'cream') {
                    ctx.fillStyle = '#FFF8DC';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }

            // Frame
            drawFrame(ctx, canvas.width, canvas.height, currentFrame);

            // Text lines
            const lines = textInput.split('\n').filter(line => line.trim());
            const totalHeight = lines.length * fontSize * 1.4;
            const startY = (canvas.height - totalHeight) / 2 + fontSize / 2;

            lines.forEach((line, index) => {
                const y = startY + index * fontSize * 1.4;
                drawMetallicText(ctx, line, canvas.width / 2, y, fontSize, scheme, shadowDepth);
            });
        }

        function downloadImage() {
            const hires = document.createElement('canvas');
            hires.width = 4000;
            hires.height = 2800;
            const ctxHires = hires.getContext('2d');
            const scale = 4;

            const textInput = document.getElementById('textInput').value || 'السلام علیکم';
            const fontSize = parseInt(document.getElementById('fontSize').value) * scale;
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value) * scale;
            const scheme = metallicSchemes[currentEffect];

            // Background
            if (backgroundImage) {
                ctxHires.drawImage(backgroundImage, 0, 0, hires.width, hires.height);
            } else {
                const bg = document.getElementById('backgroundSelect').value;
                if (bg === 'white') {
                    ctxHires.fillStyle = '#FFFFFF';
                } else if (bg === 'gradient') {
                    const grad = ctxHires.createLinearGradient(0, 0, hires.width, hires.height);
                    grad.addColorStop(0, '#F5F7FA');
                    grad.addColorStop(1, '#E8EAEF');
                    ctxHires.fillStyle = grad;
                } else if (bg === 'light') {
                    ctxHires.fillStyle = '#F9F9F9';
                } else if (bg === 'cream') {
                    ctxHires.fillStyle = '#FFF8DC';
                }
                ctxHires.fillRect(0, 0, hires.width, hires.height);
            }

            // Frame
            drawFrame(ctxHires, hires.width, hires.height, currentFrame);

            // Text
            const lines = textInput.split('\n').filter(line => line.trim());
            const totalHeight = lines.length * fontSize * 1.4;
            const startY = (hires.height - totalHeight) / 2 + fontSize / 2;

            lines.forEach((line, index) => {
                const y = startY + index * fontSize * 1.4;
                drawMetallicText(ctxHires, line, hires.width / 2, y, fontSize, scheme, shadowDepth);
            });

            const link = document.createElement('a');
            link.href = hires.toDataURL('image/png');
            link.download = `3D-Premium-Design-${Date.now()}.png`;
            link.click();
        }

        function resetSettings() {
            document.getElementById('textInput').value = 'السلام علیکم\nورحمة الله';
            document.getElementById('fontSize').value = 90;
            document.getElementById('shadowDepth').value = 28;
            document.getElementById('backgroundSelect').value = 'white';
            document.getElementById('bgImageInput').value = '';
            backgroundImage = null;
            document.getElementById('fontSizeValue').textContent = '90px';
            document.getElementById('shadowDepthValue').textContent = '28px';
            document.querySelectorAll('[data-effect]')[0].click();
            document.querySelectorAll('[data-frame]')[0].click();
            render();
        }

        setTimeout(() => render(), 500);
    </script>
</body>
</html>
